<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <section class="main">

    <form id="form-adicionar" class="header">
      <input type="text" id="input-item" placeholder="Adicione um item a sua lista...">
      <div class="header-div">
        <span>Itens na lista</span>
        <span id="tamanho-lista">0</span>
      </div>
      <button class="botoes" type="submit">Adicionar</button>
    </form>


    <div class="content">
      <ul id="container">

      </ul>
    </div>

    <div class="footer">
      <button class="botoes" id="btn-limpar">Limpar</button>
      <button class="botoes botaocomprar" id="btn-comprar">Comprar</button>
    </div>

  </section>
  <script src="app.js"></script>
</body>

</html>
