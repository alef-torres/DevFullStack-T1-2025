<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .Container {
      width: 500px;
      height: 500px;
      background-color: #6EF5B4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .Container-item {
      margin: 20px 0 20px 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    span {
      color: #594BF5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 500;
    }

    input {
      border-radius: 10px;
      border-color: #594BF5;
    }
  </style>
</head>

<body>
  <div class="Container">
    <form action="">
      <div class="Container-item">
        <label><span>Nome Completo</span></label>
        <input type="text">
      </div>

      <div class="Container-item">
        <label><span>Email</span></label>
        <input type="email">
      </div>

      <div class="Container-item">
        <label><span>Senha</span></label>
        <input type="password">
      </div>

      <div class="Container-item">
        <label><span>Gênero</span></label>
        <label for="male">
          <input type="radio" name="gender" id=""><span>Masculino</span>
        </label>
        <label for="femele">
          <input type="radio" name="gender" id=""><span>Feminino</span>
        </label>
        <label for="other">
          <input type="radio" name="gender" id=""><span>Outro</span>
        </label>
      </div>

      <div class="Container-item">
        <label for="city"><span>Cidade</span></label>
        <select name="city" id="">
          <option value="br"><span>Canoas</span></option>
          <option value="br"><span>Porto Alegre</span></option>
          <option value="br"><span>Xique Xique</span></option>
          <option value="br"><span>Esteio</span></option>
          <option value="br"><span>Jaguarão</span></option>
        </select>
      </div>

      <div class="Container-item">
        <label for="menssage"><span>Mensagem</span></label>
        <textarea name="menssage" id="" rows="1" placeholder="Deixe uma mensagem"></textarea>
      </div>

      <div class="Container-item">
        <label for="terms">
          <input type="checkbox" name="" id=""><span>Aceito os termos.</span>
        </label>
      </div>

      <div class="Container-item">
        <button type="submit"><span>Enviar</span></button>
      </div>

    </form>
  </div>
</body>

</html>
