<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      background-color: rgb(136, 137, 134);
    }

    .card {
      width: 200px;
      height: 400px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      border-radius: 20px;
      background-color: white;
      box-shadow: 10px 15px 15px rgba(0, 0, 0, 0.2);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      align-items: center;
      margin: 5px;
    }

    .card img {
      border-radius: 20px;
      margin-top: 5px;
      width: 100%;
    }

    .card h3 {
      font-family: inherit;
    }

    .card span {
      font-family: inherit;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="/2-Front-End-Basics/5-aula-17-06/ventilador.jpg" alt="">
    <h3>Ventilador</h3>
    <span>R$ 100,00</span>
    <button type="submit">Comprar</button>
  </div>

</body>

</html>

<!-- Você está desenvolvendo uma loja virtual e precisa criar um card de produto que contenha:

    Uma imagem do produto

    O nome do produto

    O preço

    Um botão "Comprar"

Requisitos de estilo:

O card deve ter 200px de largura, com espaço interno (padding) de 20px para que o conteúdo não fique colado nas bordas.

Deve haver uma borda sólida de 2px ao redor do card.

O botão "Comprar" deve ficar colado ao fundo do card com padding interno, mas com uma margem externa que o afaste de outros elementos abaixo.

O card não pode ultrapassar os 200px de largura total, mesmo com padding e borda.
-->
